<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="description" content="E. P. E. — Eddie’s Print Engine: 26-Seiten Ausmal- & Mini-Quest-Bücher aus deinen Fotos. Kids & Senior Modus. KDP-ready." />

    <!-- Open Graph -->
    <meta property="og:title" content="E. P. E. — Eddie’s Print Engine" />
    <meta property="og:description" content="Aus deinen Fotos wird ein 26-Seiten-Buch: Ausmalen + Mini-Quests. Kids & Senior Modus. KDP-ready." />
    <meta property="og:url" content="https://keschflow.github.io/eddies-print-engine-public/" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://keschflow.github.io/eddies-print-engine-public/og-preview.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://keschflow.github.io/eddies-print-engine-public/og-preview.png">

    <title>E. P. E. — Eddie’s Print Engine</title>

    <style>
      :root {
        --purple: #7c3aed;
        --purple-dark: #4c1d95;
        --glass: rgba(255,255,255,0.10);
        --glass-border: rgba(255,255,255,0.18);
      }

      * { margin:0; padding:0; box-sizing:border-box; }

      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, var(--purple) 0%, var(--purple-dark) 100%);
        color: white;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .wrap { max-width: 980px; width: 100%; }

      .card {
        background: linear-gradient(180deg, var(--glass), rgba(255,255,255,0.06));
        border: 1px solid var(--glass-border);
        border-radius: 28px;
        padding: 40px 28px;
        backdrop-filter: blur(12px);
        box-shadow: 0 20px 70px rgba(0,0,0,0.45);
        text-align: center;
      }

      h1 {
        font-size: clamp(2.4rem, 7vw, 4.2rem);
        line-height: 1.05;
        margin-bottom: 14px;
      }

      .lead {
        font-size: clamp(1.12rem, 2.8vw, 1.45rem);
        max-width: 70ch;
        margin: 0 auto 30px;
        opacity: 0.95;
      }

      .actions {
        display: flex;
        justify-content: center;
        margin: 26px 0 10px;
      }

      .btn {
        display: inline-block;
        padding: 16px 32px;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 800;
        font-size: 1.15rem;
        background: white;
        color: var(--purple-dark);
        box-shadow: 0 12px 36px rgba(0,0,0,0.4);
        transition: all 0.18s ease;
      }

      .btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 18px 50px rgba(0,0,0,0.5);
      }

      .meta {
        margin-top: 14px;
        font-size: 1.02rem;
        opacity: 0.92;
      }

      .footer {
        margin-top: 22px;
        font-size: 0.95rem;
        opacity: 0.8;
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      <section class="card">
        <h1>E. P. E.<br/>Eddie’s Print Engine</h1>

        <p class="lead">
          Aus deinen Fotos wird ein persönliches 26-Seiten-Buch:<br/>
          Ausmalen + Mini-Quests — Kids-Modus (Action & XP) oder Senior-Modus (ruhig).
        </p>

        <div class="actions">
          <a class="btn"
             href="https://forms.gle/bNxksup8ZoDWaAE5A"
             target="_blank"
             rel="noopener">
             Zugang zur Engine anfragen →
          </a>
        </div>

        <div class="meta">
          Zugang wird manuell geprüft. Keine automatische Freischaltung.
        </div>

        <div class="footer">
          © 2026 Eddie’s World · E.P.E.
        </div>
      </section>
    </div>
  </body>
</html>
