  <style>
    :root {
      --purple: #7c3aed;
      --purple-dark: #4c1d95;
      --glass: rgba(255,255,255,0.10);
      --glass-border: rgba(255,255,255,0.18);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, var(--purple) 0%, var(--purple-dark) 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .wrap { max-width: 980px; width: 100%; }

    .card {
      background: linear-gradient(180deg, var(--glass), rgba(255,255,255,0.06));
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      padding: 40px 28px;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 70px rgba(0,0,0,0.45);
      text-align: center;
    }

    h1 {
      font-size: clamp(2.4rem, 7vw, 4.2rem);
      line-height: 1.05;
      margin-bottom: 14px;
    }

    .lead {
      font-size: clamp(1.12rem, 2.8vw, 1.45rem);
      max-width: 70ch;
      margin: 0 auto 22px;
      opacity: 0.95;
    }

    .actions {
      display: flex;
      justify-content: center;
      margin: 26px 0 10px;
    }

    .btn {
      display: inline-block;
      padding: 14px 26px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 800;
      font-size: 1.15rem;
      transition: all 0.18s ease;
      background: white;
      color: var(--purple-dark);
      box-shadow: 0 12px 36px rgba(0,0,0,0.4);
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 50px rgba(0,0,0,0.5);
    }

    .meta {
      margin-top: 14px;
      font-size: 1.02rem;
      opacity: 0.92;
    }

    .footer {
      margin-top: 22px;
      font-size: 0.95rem;
      opacity: 0.8;
    }

    @media (max-width: 768px) {
      .card { padding: 28px 18px; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <section class="card">
      <h1>E. P. E.<br/>Eddie’s Print Engine</h1>

      <p class="lead">
        Aus deinen Fotos wird ein persönliches Buch.<br/>
        Direkt starten. Kein Login. Kein Umweg.
      </p>

      <div class="actions">
        <a class="btn"
           href="https://eddies-print-engine.streamlit.app"
           target="_blank"
           rel="noopener">
          App starten →
        </a>
      </div>

      <div class="meta">Ein Link. Ein Einstieg. Kein Gelaber.</div>
      <div class="footer">© 2026 Eddie’s World · E.P.E.</div>
    </section>
  </div>
</body>
</html>
